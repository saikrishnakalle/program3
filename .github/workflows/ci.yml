name: CI Pipeline

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: "Test file for this branch"
        default: "test_decimal.py"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature/test branch
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pytest

      - name: Run program
        run: python app.py

      - name: Run test
        run: pytest ${{ github.event.inputs.test_file }} -v

      - name: Summary
        run: |
          echo "============================="
          echo " Branch  : feature/test"
          echo " Test    : ${{ github.event.inputs.test_file }}"
          echo "============================="
