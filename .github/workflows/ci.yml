name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
      - feature/**
  pull_request:
  workflow_dispatch:
    inputs:
      branch:
        description: "Select Branch"
        type: choice
        options:
          - main
          - dev
          - feature/test
        default: main

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      test_file:    ${{ steps.resolve.outputs.test_file }}
      program_file: ${{ steps.resolve.outputs.program_file }}
      branch_name:  ${{ steps.resolve.outputs.branch_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect branch and resolve files
        id: resolve
        run: |
          # Works for both push trigger and manual trigger
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            BRANCH="${{ github.event.inputs.branch }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          echo "Running on branch: $BRANCH"

          # ── Branch → file mapping ──────────────────────────────
          # ADD YOUR BRANCHES HERE as your project grows
          case "$BRANCH" in
            main)
              TEST_FILE="test_math.py"
              PROGRAM_FILE="app.py"
              ;;
            dev)
              TEST_FILE="test_large.py"
              PROGRAM_FILE="app.py"
              ;;
            feature/test)
              TEST_FILE="test_decimal.py"
              PROGRAM_FILE="app.py"
              ;;
            feature/*)
              # Any other feature branch falls here
              TEST_FILE="test_app.py"
              PROGRAM_FILE="app.py"
              ;;
            *)
              TEST_FILE="test_app.py"
              PROGRAM_FILE="app.py"
              ;;
          esac

          echo "Resolved → Program: $PROGRAM_FILE | Test: $TEST_FILE"
          echo "test_file=$TEST_FILE"       >> $GITHUB_OUTPUT
          echo "program_file=$PROGRAM_FILE" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH"        >> $GITHUB_OUTPUT

  verify:
    runs-on: ubuntu-latest
    needs: detect
    outputs:
      files_valid: ${{ steps.check.outputs.valid }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.branch_name }}

      - name: Verify resolved files exist on branch
        id: check
        run: |
          BRANCH="${{ needs.detect.outputs.branch_name }}"
          TEST="${{ needs.detect.outputs.test_file }}"
          PROG="${{ needs.detect.outputs.program_file }}"

          echo "======================================"
          echo "  BRANCH  : $BRANCH"
          echo "  PROGRAM : $PROG"
          echo "  TEST    : $TEST"
          echo "======================================"

          VALID=true

          if [ ! -f "$PROG" ]; then
            echo "❌ MISSING: $PROG not found in branch $BRANCH"
            VALID=false
          else
            echo "✅ FOUND:   $PROG"
          fi

          if [ ! -f "$TEST" ]; then
            echo "❌ MISSING: $TEST not found in branch $BRANCH"
            VALID=false
          else
            echo "✅ FOUND:   $TEST"
          fi

          echo "valid=$VALID" >> $GITHUB_OUTPUT

          if [ "$VALID" == "false" ]; then
            echo ""
            echo "Available files in this branch:"
            ls *.py 2>/dev/null || echo "(no .py files found)"
            exit 1
          fi

  run:
    runs-on: ubuntu-latest
    needs: [detect, verify]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.branch_name }}

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install pytest

      - name: Run program
        run: |
          echo "▶ Running: ${{ needs.detect.outputs.program_file }}"
          python ${{ needs.detect.outputs.program_file }}

      - name: Run baseline test (always)
        run: pytest test_app.py -v

      - name: Run branch-specific test
        run: |
          echo "▶ Running test: ${{ needs.detect.outputs.test_file }}"
          pytest ${{ needs.detect.outputs.test_file }} -v

      - name: Summary
        run: |
          echo "======================================"
          echo "  ✅ PIPELINE COMPLETE"
          echo "  Branch  : ${{ needs.detect.outputs.branch_name }}"
          echo "  Program : ${{ needs.detect.outputs.program_file }}"
          echo "  Test    : ${{ needs.detect.outputs.test_file }}"
          echo "======================================"
